<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CPM自助修改平台V1.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body { font-family: Arial, sans-serif; background: url("https://i.postimg.cc/XYj6dDzv/IMG-0133.jpg") no-repeat center center fixed; background-size: cover; margin: 0; padding: 0; color: white; }
    .center-wrapper { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .container { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 20px 30px 10px 30px; border-radius: 10px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); width: 295px; text-align: center; }
    input { width:85%; padding:10px; margin:8px 0; border-radius:5px; border:none; background: rgba(255,255,255,0.1); color:#fff; outline: none; text-align: center; }
    button { width: 99%; padding: 10px; margin: 6px 0; border-radius: 5px; cursor: pointer; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); color: #ffffff; font-weight: bold; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5); transition: 0.3s; }
    button:hover { background: rgba(255, 255, 255, 0.25); }
    .status { margin-top:10px; color:#0f0; word-wrap: break-word; font-size: 14px; min-height: 20px;}
    .error { color:#f55; }
    #keyForm, #loginForm, #menuButtons { display: none; }
    footer { margin-top: 15px; font-size: 13px; color: #fff; opacity: 0.8; }
    .key-info-box { background: rgba(0,0,0,0.3); padding: 6px; border-radius: 5px; margin-bottom: 10px; font-size: 11px; text-align: left; line-height: 1.6; }
    .info-title { color: #ffeb3b; text-align: center; font-weight: bold; margin-bottom: 4px; font-size: 12px; }
    .status-span { float: right; font-weight: bold; }
    .status-ok { color: #0f0; }
    .status-lock { color: #f55; text-decoration: line-through; }
</style>
</head>
<body>

<div class="center-wrapper">
  <div class="container">
      <h1>👑CPM修改器👑</h1>
      
      <div id="keyForm" style="display: block;">
          <input type="text" id="cdkey" placeholder="请输入操作卡密" />
          <button onclick="verifyKey()">验证卡密</button>
      </div>

      <div id="loginForm">
          <input type="email" id="email" placeholder="游戏邮箱" />
          <input type="password" id="password" placeholder="游戏密码" />
          <button onclick="loginFirebase()">验证登录</button>
      </div>
      
      <div id="menuButtons">
          <div class="key-info-box">
              <div class="info-title">📊 功能可用状态面板</div>
              <div>👑 一键皇冠: <span id="statusCrown" class="status-span">检测中</span></div>
              <div>📧 修改邮箱: <span id="statusEmail" class="status-span">检测中</span></div>
              <div>🔐 修改密码: <span id="statusPassword" class="status-span">检测中</span></div>
          </div>
          
          <button onclick="kingRank()">👑 一键皇冠等级</button>
          <button onclick="changeEmail()">📧 修改邮箱</button>
          <button onclick="changePassword()">🔐 修改密码</button>
          <button style="background:rgba(255,165,0,0.2)" onclick="logout()">🚪 安全退出</button> 
      </div>
      
      <div id="status" class="status"></div>
      <footer>© CPM老王工作室版权所有</footer>
  </div>
</div>
